name: cantara-stingray
version: 1.0.0
description: >
  Stingray application framework — the foundational layer for Cantara microservices.
  Covers the multi-module structure (application, security, sql, http-client),
  StingrayApplication bootstrap, Whydah security integration, SQL/Flyway
  database layer, health probes, and CORS handling. Used by ConfigService,
  microservice-baseline, and other Cantara services.

  Trigger phrases: "stingray, stingray application, stingray framework, stingray security,
  stingray sql, stingray flyway, stingray health, stingray whydah, cantara framework,
